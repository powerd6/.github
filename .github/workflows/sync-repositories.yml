# This workflow sets all the repository settings to a standard.
# This includes:
#   - The repositorires configuration
#   - The repositories labels

name: Sync Repositories

env:
  # Add more repositories with the <owner>/<repository> syntax below
  REPOSITORIES: |
    powerd6/.github
    powerd6/module-template
    powerd6/experiments
    powerd6/insider

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Runs at midnight

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


jobs:
  sync-settings:
    runs-on: ubuntu-latest
    
    steps:
      - uses: kbrashears5/github-action-repo-settings-sync@v1.0.0
        with:
          REPOSITORIES: ${{ env.REPOSITORIES }}
          ALLOW_ISSUES: 'true'
          ALLOW_PROJECTS: 'true'
          ALLOW_WIKI: 'false'
          SQUASH_MERGE: 'true'
          MERGE_COMMIT: 'false'
          REBASE_MERGE: 'false'
          AUTO_MERGE: 'false'
          DELETE_HEAD: 'true'
          BRANCH_PROTECTION_NAME: 'main'
          BRANCH_PROTECTION_DISMISS: 'true'
          TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}

  sync-labels:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
          token: ${{ secrets.PERSONAL_TOKEN }}
          repository: ${{ env.REPOSITORIES }}